# Why: reproducible JSON report for ops / future Notion/GitHub Sync without local gh CLI.

name: Ops — GitHub sync report

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Generate sync report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/github-sync-report.mjs

      - uses: actions/upload-artifact@654628066fd6634881fcb8f56b22f9c930b80b3f # v4.3.3
        with:
          name: sync-report-json
          path: reports/sync-report.*.json
