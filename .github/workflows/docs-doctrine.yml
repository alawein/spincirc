name: Docs Doctrine

on:
  push:
    paths: ["**/*.md"]
  pull_request:
    paths: ["**/*.md"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doctrine:
    uses: alawein/alawein/.github/workflows/doctrine-reusable.yml@872152633ca34d53cf7ff875a361f5eeac49d0e4
    with:
      strict: "true"
