name: Docs Doctrine

on:
  push:
    paths: ["**/*.md"]
  pull_request:
    paths: ["**/*.md"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doctrine:
    uses: alawein/alawein/.github/workflows/doctrine-reusable.yml@2e0892cf9a005a896dd6addec202842522b86424
    with:
      strict: "true"
